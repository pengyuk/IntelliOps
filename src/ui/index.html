<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IntelliOps 应急认知工作间</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --blue: #2358d3;
      --cyan: #0e7490;
      --green: #15803d;
      --amber: #a16207;
      --red: #b42318;
      --violet: #6d28d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      background: #f7f9fc;
      color: var(--ink);
      font-weight: 650;
    }
    button:hover { border-color: #a9b8ce; }
    button.primary { background: var(--blue); color: #fff; }
    button.ghost { background: transparent; border-color: var(--line); }
    button.danger { background: #fff1f0; color: var(--red); border-color: #ffd1cc; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; color: var(--muted); font-size: 13px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #edf2ff;
      color: #1d4ed8;
      font-weight: 700;
    }
    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.warn { background: #fef3c7; color: #92400e; }
    .badge.bad { background: #fee2e2; color: #991b1b; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    main {
      display: grid;
      grid-template-columns: var(--col1,250px) var(--col2,minmax(420px,1fr)) var(--col3,340px);
      grid-template-rows: 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
      position: relative;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #fbfdff;
    }
    .panel-head.resize-drag { cursor: row-resize; }
    .panel-head.resize-drag:hover { background: rgba(15,23,42,0.04); }
    .panel-body { padding: 10px; overflow: auto; min-height: 0; flex: 1; }
    .panel { display: flex; flex-direction: column; min-height: 0; }
    .composer { flex-shrink: 0; }
    .incident-list { display: grid; gap: 8px; }
    .incident {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      background: #f8fafc;
      cursor: pointer;
    }
    .incident.active { border-color: var(--blue); background: #edf4ff; }
    .incident strong { display: block; font-size: 13px; line-height: 1.35; }
    .incident small { color: var(--muted); }
    .workspace { grid-column: 2; grid-row: 1; display: grid; grid-template-rows: minmax(0,1fr) minmax(120px, var(--workspace-bottom,260px)); gap: 12px; min-height: 0; }
    .split { display: grid; grid-template-columns: var(--workspace-left,1fr) 10px var(--workspace-right,1fr); gap: 0; min-height: 0; height: 100%; }
    .split > .panel { min-height: 0; }
    .context { grid-column: 1; grid-row: 1; }
    .right-col { grid-column: 3; grid-row: 1; display: grid; grid-template-rows: minmax(0,1fr) minmax(120px, var(--right-bottom,260px)); gap: 12px; min-height: 0; }
    .discussion { grid-row: 1; }
    .scripts { grid-column: 2; grid-row: 2; }
    .logs { grid-row: 2; }
    .split-resizer {
      width: 10px;
      cursor: col-resize;
      background: transparent;
      z-index: 6;
    }
    .split-resizer:hover { background: rgba(15,23,42,0.06); }
    .panel-row-resizer {
      height: 8px;
      cursor: row-resize;
      background: transparent;
      margin: 0;
    }
    .panel-row-resizer:hover { background: rgba(15,23,42,0.06); }
    .col-resizer {
      grid-row: 1 / -1;
      width: 10px;
      background: transparent;
      cursor: col-resize;
      justify-self: start;
      z-index: 6;
    }
    .col-resizer:hover { background: rgba(15,23,42,0.04); }
    .timeline-item, .card, .message, .log {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      background: #f8fafc;
      margin-bottom: 8px;
    }
    .card.cause { border-left: 4px solid var(--blue); }
    .card.asset { border-left: 4px solid var(--cyan); }
    .script.low { border-left: 4px solid var(--green); }
    .script.medium { border-left: 4px solid var(--amber); }
    .script.high { border-left: 4px solid var(--red); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .muted { color: var(--muted); font-size: 12px; }
    .progress { height: 8px; background: #e6edf5; border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .progress span { display: block; height: 100%; background: var(--green); }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .chip { border: 1px solid var(--line); background: #fff; border-radius: 5px; padding: 3px 7px; font-size: 12px; }
    .message.operator { border-left: 4px solid var(--blue); }
    .message.developer { border-left: 4px solid var(--cyan); }
    .message.approver { border-left: 4px solid var(--violet); }
    .message.copilot { border-left: 4px solid var(--green); }
    .timeline-item.alert { border-left: 4px solid var(--red); }
    .timeline-item.diagnosis { border-left: 4px solid var(--blue); }
    .timeline-item.action_result, .timeline-item.action_execution { border-left: 4px solid var(--green); }
    .timeline-item.status, .timeline-item.conclusion, .timeline-item.decision { border-left: 4px solid var(--violet); }
    .result-box {
      margin-top: 8px;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      border-radius: 7px;
      padding: 8px;
      font-size: 13px;
    }
    .composer { border-top: 1px solid var(--line); padding: 10px; display: grid; gap: 8px; }
    textarea, select {
      width: 100%;
      min-height: 44px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: #fff;
      color: var(--ink);
    }
    .status-line {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      max-width: min(640px, calc(100vw - 24px));
      background: #172033;
      color: #fff;
      padding: 9px 12px;
      border-radius: 7px;
      box-shadow: 0 8px 28px rgba(23,32,51,.2);
      display: none;
      z-index: 5;
    }
    dialog {
      position: fixed;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 24px));
      max-height: 80vh;
      resize: both;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    #postmortemDialog .panel-head { cursor: grab; }
    dialog::backdrop { background: rgba(15, 23, 42, .42); }
    .modal-body { padding: 14px; max-height: 70vh; overflow: auto; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 10px; border-radius: 7px; font-size: 12px; }
    @media (max-width: 1100px) {
      .app { height: auto; min-height: 100vh; overflow: visible; }
      main { grid-template-columns: 1fr; grid-template-rows: auto; overflow: visible; }
      .context, .workspace, .discussion, .scripts, .logs { grid-column: 1; grid-row: auto; }
      .workspace, .split { grid-template-columns: 1fr; grid-template-rows: auto; }
      .panel { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1 id="title">IntelliOps 应急认知工作间</h1>
        <div id="headlineMeta" class="meta"></div>
      </div>
      <div class="top-actions">
        <select id="userSelect" style="width:150px;min-height:34px"></select>
        <button id="refreshBtn" class="ghost">刷新</button>
        <button id="loadDataBtn" class="ghost">数据摘要</button>
        <button id="diagnoseBtn" class="primary">Copilot 诊断</button>
        <button id="postmortemBtn">生成复盘</button>
      </div>
    </header>
    <main>
      <div id="col-resizer-1" class="col-resizer" style="grid-column:2;"></div>
      <div id="col-resizer-2" class="col-resizer" style="grid-column:3;"></div>
      <section class="panel context">
        <div class="panel-head"><h2>事故与上下文</h2><span id="summaryBadge" class="badge"></span></div>
        <div class="panel-body">
          <div id="incidentList" class="incident-list"></div>
          <h2 style="margin:14px 0 8px">知识上下文</h2>
          <div id="kgContext"></div>
          <h2 style="margin:14px 0 8px">时间线</h2>
          <div id="timeline"></div>
        </div>
      </section>
      <section class="workspace">
        <div class="split">
          <section class="panel">
            <div class="panel-head"><h2>根因推理</h2><span id="diagBadge" class="badge warn">待诊断</span></div>
            <div id="diagnosis" class="panel-body"></div>
          </section>
          <div id="workspace-splitter" class="split-resizer"></div>
          <section class="panel">
            <div class="panel-head"><h2>相似案例与知识资产</h2></div>
            <div id="assets" class="panel-body"></div>
          </section>
        </div>
        <section id="scriptsSection" class="panel">
          <div class="panel-head resize-drag"><h2>脚本与处置动作</h2><button id="loadScriptsBtn" class="ghost">推荐脚本</button></div>
          <div id="scripts" class="panel-body"></div>
          <div id="scripts-row-resizer" class="panel-row-resizer"></div>
        </section>
      </section>
      <div class="right-col">
        <section class="panel discussion">
          <div class="panel-head"><h2>协同讨论</h2><span class="badge ok">War Room</span></div>
          <div id="messages" class="panel-body"></div>
          <div class="composer">
            <textarea id="messageInput" placeholder="向团队或 Copilot 补充现场信息"></textarea>
            <div class="row">
              <button id="sendDiscussionBtn">发送讨论</button>
              <button id="askCopilotBtn" class="primary">问 Copilot</button>
            </div>
          </div>
        </section>
        <section id="logsSection" class="panel logs">
          <div class="panel-head resize-drag"><h2>执行审计</h2><button id="loadLogsBtn" class="ghost">刷新日志</button></div>
          <div id="logs-row-resizer" class="panel-row-resizer"></div>
          <div class="panel-body">
          <div class="row" style="gap:8px;margin-bottom:12px;align-items:center;">
            <input id="alarmIdInput" placeholder="输入 alarm_id 例如 al-0001" style="flex:1;min-width:140px;border:1px solid var(--line);border-radius:7px;padding:8px;" />
            <button id="alarmMatchBtn" class="ghost">告警匹配</button>
            <button id="alarmImpactBtn" class="ghost">影响范围</button>
            <button id="alarmDiagnosisBtn" class="primary">告警诊断</button>
          </div>
          <div id="alarmDiagResult" style="margin-bottom:12px;"></div>
          <div id="logs"></div>
        </div>
      </section>
      </div>
    </main>
  </div>
  <dialog id="postmortemDialog">
    <div class="panel-head"><h2>自动复盘报告</h2><button id="closeDialogBtn" type="button">关闭</button></div>
    <div id="postmortemBody" class="modal-body"></div>
  </dialog>
  <div id="toast" class="status-line"></div>
  <script>
    const API_BASE = location.origin && location.pathname.startsWith('/ui') ? location.origin : 'http://localhost:8000';
    const state = {
      incidents: [],
      incident: null,
      selectedId: '',
      users: [],
      userId: 'ui-user',
      currentUser: null,
      diagnosis: null,
      scripts: [],
      messages: [],
      timeline: [],
      logs: [],
      assets: [],
      cases: [],
      postmortem: null
    };

    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) }
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function toast(text) {
      const box = $('toast');
      box.textContent = text;
      box.style.display = 'block';
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => box.style.display = 'none', 2600);
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function statusClass(status) {
      if (status === 'Resolved') return 'ok';
      if (status === 'Investigating') return 'warn';
      return 'bad';
    }

    function currentUser() {
      return state.users.find(u => u.user_id === state.userId) || null;
    }

    function canExecute() {
      return currentUser()?.role === 'operator';
    }

    function timelineLabel(type) {
      return {
        alert: '告警触发',
        diagnosis: 'AI 推理',
        action_result: '执行结果',
        action_execution: '动作执行',
        action_request: '审批请求',
        action_approval: '审批结论',
        status: '状态变更',
        conclusion: '关键结论',
        decision: '处置决策',
        handoff: '开发协同'
      }[type] || type || '事件';
    }

    async function boot() {
      await Promise.all([loadUsers(), loadIncidents(), loadLogs()]);
      bindEvents();
    }

    function bindEvents() {
      $('refreshBtn').onclick = refreshAll;
      $('loadDataBtn').onclick = loadDataSummary;
      $('diagnoseBtn').onclick = runDiagnosis;
      $('postmortemBtn').onclick = createPostmortem;
      $('loadScriptsBtn').onclick = loadScripts;
      $('loadLogsBtn').onclick = loadLogs;
      $('alarmMatchBtn').onclick = loadAlarmMatch;
      $('alarmImpactBtn').onclick = loadAlarmImpact;
      $('alarmDiagnosisBtn').onclick = runAlarmDiagnosis;
      $('sendDiscussionBtn').onclick = sendDiscussion;
      $('askCopilotBtn').onclick = askCopilot;
      $('closeDialogBtn').onclick = () => $('postmortemDialog').close();

      const postmortemDialog = $('postmortemDialog');
      if (postmortemDialog) {
        const header = postmortemDialog.querySelector('.panel-head');
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dialogStartLeft = 0;
        let dialogStartTop = 0;

        header?.addEventListener('pointerdown', (event) => {
          if (event.target instanceof HTMLElement && event.target.closest('#closeDialogBtn')) {
            return;
          }
          isDragging = true;
          dragStartX = event.clientX;
          dragStartY = event.clientY;
          const rect = postmortemDialog.getBoundingClientRect();
          dialogStartLeft = rect.left;
          dialogStartTop = rect.top;
          postmortemDialog.style.transform = 'none';
          postmortemDialog.style.left = `${rect.left}px`;
          postmortemDialog.style.top = `${rect.top}px`;
          header.setPointerCapture(event.pointerId);
        });

        window.addEventListener('pointermove', (event) => {
          if (!isDragging) return;
          postmortemDialog.style.left = `${dialogStartLeft + event.clientX - dragStartX}px`;
          postmortemDialog.style.top = `${dialogStartTop + event.clientY - dragStartY}px`;
        });

        window.addEventListener('pointerup', () => {
          isDragging = false;
        });
      }

      $('userSelect').onchange = (event) => {
        state.userId = event.target.value;
        renderHeader();
        renderScripts();
      };
    }

    async function refreshAll() {
      if (!state.selectedId) return;
      await Promise.all([
        loadIncidents(false),
        loadIncident(state.selectedId),
        loadTimeline(state.selectedId),
        loadDiscussion(state.selectedId),
        loadAssets(state.selectedId),
        loadLogs()
      ]);
      toast('已刷新工作间数据');
    }

    async function loadUsers() {
      const data = await api('/auth/users');
      state.users = data.users || [];
      $('userSelect').innerHTML = state.users.map(u => `<option value="${esc(u.user_id)}">${esc(u.name)} · ${esc(u.role)}</option>`).join('');
      $('userSelect').value = state.userId;
    }

    async function loadDataSummary() {
      try {
        const summary = await api('/data/summary');
        $('alarmDiagResult').innerHTML = `
          <div class="card">
            <strong>数据载入摘要</strong>
            <p class="muted">系统关系 ${summary.system_relations}, 应用登记 ${summary.application_registry}, 告警记录 ${summary.alarm_records}, 复盘报告 ${summary.postmortem_reports}</p>
            <p class="muted">源文件：${Object.entries(summary.source_files).map(([key, files]) => `${esc(key)} ${files.join(', ')}`).join(' | ')}</p>
          </div>
        `;
      } catch (err) {
        toast('数据摘要获取失败：' + err.message);
      }
    }

    function renderAlarmDiagResult(title, details) {
      $('alarmDiagResult').innerHTML = `
        <div class="card asset">
          <strong>${esc(title)}</strong>
          ${details.map(line => `<p class="muted">${esc(line)}</p>`).join('')}
        </div>
      `;
    }

    async function loadAlarmMatch() {
      const alarmId = $('alarmIdInput').value.trim();
      if (!alarmId) {
        toast('请先输入告警 ID');
        return;
      }
      try {
        const data = await api(`/alarm/${encodeURIComponent(alarmId)}/match`);
        renderAlarmDiagResult('告警系统匹配结果', [
          `匹配系统: ${data.matched_systems.map(s => s.name || s.id).join(', ') || '无'}`,
          `负责人: ${data.owners.join(', ') || '未识别'}`,
          `匹配文本: ${data.match_text || '无'}`
        ]);
      } catch (err) {
        toast('告警匹配失败：' + err.message);
      }
    }

    async function loadAlarmImpact() {
      const alarmId = $('alarmIdInput').value.trim();
      if (!alarmId) {
        toast('请先输入告警 ID');
        return;
      }
      try {
        const data = await api(`/alarm/${encodeURIComponent(alarmId)}/impact`);
        renderAlarmDiagResult('告警影响范围', [
          `根系统: ${data.root_systems?.join(', ') || '无'}`,
          `影响节点: ${data.affected_node_ids?.join(', ') || '无'}`,
          `路径数量: ${data.paths?.length || 0}`
        ]);
      } catch (err) {
        toast('影响范围查询失败：' + err.message);
      }
    }

    async function runAlarmDiagnosis() {
      const alarmId = $('alarmIdInput').value.trim();
      if (!alarmId) {
        toast('请先输入告警 ID');
        return;
      }
      try {
        const diag = await api(`/diagnosis/alarm/${encodeURIComponent(alarmId)}`);
        renderAlarmDiagResult('告警自动诊断', [
          `根因候选: ${(diag.root_cause_candidates || []).map(c => `${c.cause}(${Math.round((c.confidence||0)*100)}%)`).join('；')}`,
          `匹配系统: ${(diag.matched_systems || []).map(s => s.name||s.id).join(', ') || '无'}`,
          `负责人: ${(diag.owners || []).join(', ') || '未识别'}`
        ]);
      } catch (err) {
        toast('告警诊断失败：' + err.message);
      }
    }

    async function loadIncidents(selectFirst = true) {
      const data = await api('/incidents');
      state.incidents = data.incidents || [];
      $('summaryBadge').textContent = `${data.summary?.open || 0} 个处理中`;
      if (selectFirst && !state.selectedId && state.incidents.length) state.selectedId = state.incidents[0].incident_id;
      renderIncidentList();
      if (state.selectedId) {
        await Promise.all([
          loadIncident(state.selectedId),
          loadTimeline(state.selectedId),
          loadDiscussion(state.selectedId),
          loadAssets(state.selectedId)
        ]);
      }
    }

    function renderIncidentList() {
      $('incidentList').innerHTML = state.incidents.map(inc => `
        <button class="incident ${inc.incident_id === state.selectedId ? 'active' : ''}" data-id="${esc(inc.incident_id)}">
          <strong>${esc(inc.summary)}</strong>
          <small>${esc(inc.incident_id)} · ${esc(inc.status)}</small>
        </button>
      `).join('');
      document.querySelectorAll('.incident').forEach(el => {
        el.onclick = async () => {
          state.selectedId = el.dataset.id;
          state.diagnosis = null;
          state.scripts = [];
          renderIncidentList();
          await refreshAll();
          renderDiagnosis();
          renderScripts();
        };
      });
    }

    async function loadIncident(id) {
      state.incident = await api(`/incident/${id}`);
      renderHeader();
      renderContext();
    }

    function renderHeader() {
      const inc = state.incident;
      if (!inc) return;
      $('title').textContent = inc.summary;
      $('headlineMeta').innerHTML = `
        <span class="badge">${esc(inc.incident_id)}</span>
        <span class="badge ${statusClass(inc.status)}">${esc(inc.status)}</span>
        <span class="badge ${canExecute() ? 'ok' : 'warn'}">${canExecute() ? '运维可执行' : '协同只读'}</span>
        <span>服务 ${inc.kg_context?.services?.length || 0}</span>
        <span>告警 ${inc.related_alerts?.length || 0}</span>
        <span>变更 ${inc.related_changes?.length || 0}</span>
      `;
    }

    function renderContext() {
      const inc = state.incident || {};
      const groups = [
        ['受影响服务', inc.kg_context?.services || []],
        ['关联告警', inc.kg_context?.alerts || []],
        ['关联变更', inc.kg_context?.changes || []]
      ];
      $('kgContext').innerHTML = groups.map(([title, items]) => `
        <div class="card">
          <div class="row"><strong>${title}</strong><span class="muted">${items.length} 项</span></div>
          <div class="chips">${items.map(item => `<span class="chip">${esc(item.name || item.id)}</span>`).join('') || '<span class="muted">暂无</span>'}</div>
        </div>
      `).join('');
    }

    async function runDiagnosis() {
      if (!state.selectedId) return;
      $('diagnoseBtn').disabled = true;
      try {
        state.diagnosis = await api('/copilot/diagnose', {
          method: 'POST',
          body: JSON.stringify({ incident_id: state.selectedId, user_id: state.userId })
        });
        await Promise.all([loadTimeline(state.selectedId), loadScripts(), loadAssets(state.selectedId)]);
        renderDiagnosis();
        toast('Copilot 已生成根因推理');
      } catch (err) {
        toast('诊断失败：' + err.message);
      } finally {
        $('diagnoseBtn').disabled = false;
      }
    }

    function renderDiagnosis() {
      const diag = state.diagnosis;
      $('diagBadge').textContent = diag ? `置信度 ${Math.round((diag.confidence_summary || 0) * 100)}%` : '待诊断';
      if (!diag) {
        $('diagnosis').innerHTML = '<div class="muted">点击“Copilot 诊断”启动根因推理、证据链和处置建议。</div>';
        return;
      }
      $('diagnosis').innerHTML = `
        ${(diag.candidate_root_causes || []).map((c, i) => `
          <div class="card cause">
            <div class="row"><strong>${i + 1}. ${esc(c.cause)}</strong><span class="badge">${Math.round((c.confidence || 0) * 100)}%</span></div>
            <div class="progress"><span style="width:${Math.round((c.confidence || 0) * 100)}%"></span></div>
            <p class="muted">${esc(c.detail || '')}</p>
            <div class="chips">${(c.evidence_chain || []).map(e => `<span class="chip">${esc(e)}</span>`).join('')}</div>
          </div>
        `).join('')}
        <h2 style="margin:12px 0 8px">推荐步骤</h2>
        ${(diag.initial_recommendations || []).map(r => `
          <div class="card">
            <strong>${esc(r.step)}</strong>
            <p class="muted">${esc(r.rationale)}</p>
            <div class="chips">${(r.tools || []).map(t => `<span class="chip">${esc(t)}</span>`).join('') || '<span class="chip">人工确认</span>'}</div>
          </div>
        `).join('')}
      `;
    }

    async function loadScripts() {
      if (!state.selectedId) return;
      const diag = state.diagnosis?.diagnosis_id || '';
      const data = await api(`/script/suggest?incident_id=${encodeURIComponent(state.selectedId)}&diagnosis_id=${encodeURIComponent(diag)}`);
      state.scripts = (data.suggestions || []).map(script => ({
        ...script,
        last_result: [...state.logs].reverse().find(log => log.action_id === script.script_id && log.incident_id === state.selectedId)
      }));
      renderScripts();
    }

    function renderScripts() {
      const executable = canExecute();
      $('scripts').innerHTML = state.scripts.map(script => `
        <div class="card script ${esc(script.risk_level)}">
          <div class="row">
            <strong>${esc(script.name)}</strong>
            <span class="badge ${script.risk_level === 'high' ? 'bad' : script.risk_level === 'medium' ? 'warn' : 'ok'}">${esc(script.risk_level)}</span>
          </div>
          <p class="muted">${esc(script.explanation)}</p>
          <pre>${esc(script.code)}</pre>
          ${script.last_result ? `
            <div class="result-box">
              <strong>最近执行结果</strong>
              <div>${esc(script.last_result.output)}</div>
              <div class="muted">${esc(script.last_result.conclusion || '')}</div>
            </div>
          ` : ''}
          <div class="row">
            <button data-verify="${esc(script.script_id)}">预执行</button>
            <button class="${script.risk_level === 'high' ? 'danger' : 'primary'}" data-exec="${esc(script.script_id)}" ${executable ? '' : 'disabled'}>${executable ? '执行并回传 Copilot' : '仅运维可执行'}</button>
          </div>
        </div>
      `).join('') || '<div class="muted">暂无脚本建议。</div>';
      document.querySelectorAll('[data-verify]').forEach(btn => btn.onclick = () => verifyScript(btn.dataset.verify));
      document.querySelectorAll('[data-exec]').forEach(btn => btn.onclick = () => executeScript(btn.dataset.exec));
    }

    async function verifyScript(scriptId) {
      const data = await api('/script/verify', { method: 'POST', body: JSON.stringify({ script_id: scriptId, user_id: state.userId }) });
      toast(data.dry_run_result);
    }

    async function executeScript(scriptId) {
      const script = state.scripts.find(s => s.script_id === scriptId);
      if (script?.approval_required) {
        toast('高风险脚本需要先走审批，本原型保留为受控动作。');
        return;
      }
      if (!canExecute()) {
        toast('当前角色只能协同分析，不能执行工具或脚本。');
        return;
      }
      const result = await api('/script/execute', {
        method: 'POST',
        body: JSON.stringify({
          script_id: scriptId,
          requested_by: state.userId,
          lifecycle_type: 'once',
          incident_id: state.selectedId,
          diagnosis_id: state.diagnosis?.diagnosis_id,
          feed_to_copilot: true
        })
      });
      if (script) script.last_result = result;
      renderScripts();
      await Promise.all([loadLogs(), loadDiscussion(state.selectedId), loadTimeline(state.selectedId)]);
      toast('脚本结果已展示，并已回传给 Copilot 继续分析');
    }

    async function loadDiscussion(id) {
      const data = await api(`/incident/${id}/discussion`);
      state.messages = data.messages || [];
      renderMessages();
    }

    function renderMessages() {
      $('messages').innerHTML = state.messages.map(msg => `
        <div class="message ${esc(msg.role || 'operator')}">
          <div class="row"><strong>${esc(msg.author)}</strong><span class="muted">${esc(msg.created_at || '')}</span></div>
          <div>${esc(msg.message)}</div>
        </div>
      `).join('') || '<div class="muted">暂无讨论消息。</div>';
      const container = $('messages');
      if (container) {
        container.scrollTop = container.scrollHeight;
      }
    }

    async function sendDiscussion() {
      const text = $('messageInput').value.trim();
      if (!text || !state.selectedId) return;
      const role = currentUser()?.role || 'operator';
      await api(`/incident/${state.selectedId}/discussion`, {
        method: 'POST',
        body: JSON.stringify({ author: state.userId, message: text, message_type: role === 'developer' ? 'development' : 'maintenance' })
      });
      $('messageInput').value = '';
      await Promise.all([loadDiscussion(state.selectedId), loadTimeline(state.selectedId)]);
    }

    async function askCopilot() {
      const text = $('messageInput').value.trim();
      if (!text || !state.selectedId) return;
      const data = await api('/copilot/chat', {
        method: 'POST',
        body: JSON.stringify({
          incident_id: state.selectedId,
          diagnosis_id: state.diagnosis?.diagnosis_id,
          user_id: state.userId,
          message: text
        })
      });
      state.diagnosis = state.diagnosis || { diagnosis_id: data.diagnosis_id };
      $('messageInput').value = '';
      await Promise.all([loadDiscussion(state.selectedId), loadTimeline(state.selectedId), loadScripts()]);
    }

    async function loadTimeline(id) {
      const data = await api(`/incident/${id}/timeline`);
      state.timeline = data.timeline || [];
      $('timeline').innerHTML = state.timeline.map(item => `
        <div class="timeline-item ${esc(item.event_type)}">
          <div class="row"><strong>${esc(timelineLabel(item.event_type))}</strong><span class="muted">${esc(item.timestamp)}</span></div>
          <div>${esc(item.summary)}</div>
          ${item.details ? `<div class="muted">${esc(item.details)}</div>` : ''}
          <div class="muted">${esc(item.actor)} · ${esc(item.role || '')}</div>
        </div>
      `).join('') || '<div class="muted">暂无时间线。</div>';
    }

    async function loadAssets(id) {
      const [cases, assets] = await Promise.all([
        api(`/incident/${id}/related-cases`),
        api(`/incident/${id}/knowledge-assets`)
      ]);
      state.cases = cases.cases || [];
      state.assets = assets.assets || [];
      $('assets').innerHTML = `
        <h2 style="margin:0 0 8px">相似案例</h2>
        ${state.cases.map(c => `
          <div class="card asset"><strong>${esc(c.summary)}</strong><p class="muted">${esc(c.root_cause)} · 匹配 ${esc(c.similarity_score)}</p></div>
        `).join('') || '<div class="muted">暂无高相似案例。</div>'}
        <h2 style="margin:12px 0 8px">知识资产</h2>
        ${state.assets.map(a => `
          <div class="card asset"><strong>${esc(a.title)}</strong><p class="muted">${esc(a.description)} · 相关度 ${Math.round((a.relevance || 0) * 100)}%</p></div>
        `).join('')}
      `;
    }

    async function loadLogs() {
      const data = await api('/action/logs');
      state.logs = data.logs || [];
      const visibleLogs = state.logs
        .filter(log => !state.selectedId || !log.incident_id || log.incident_id === state.selectedId)
        .slice()
        .reverse();
      $('logs').innerHTML = visibleLogs.map(log => `
        <div class="log">
          <div class="row"><strong>${esc(log.script_name || log.action_id)}</strong><span class="badge ${log.status === 'success' ? 'ok' : 'warn'}">${esc(log.status)}</span></div>
          <div class="muted">${esc(log.requested_by || '')} · ${esc(log.created_at || '')}</div>
          <div>${esc(log.output || '')}</div>
          ${log.conclusion ? `<div class="muted">${esc(log.conclusion)}</div>` : ''}
        </div>
      `).join('') || '<div class="muted">暂无执行日志。</div>';
    }

    async function createPostmortem() {
      if (!state.selectedId) return;
      const report = await api(`/incident/${state.selectedId}/postmortem`, {
        method: 'POST',
        body: JSON.stringify({ requested_by: state.userId, mark_resolved: true })
      });
      state.postmortem = report;
      $('postmortemBody').innerHTML = `
        <div class="card">
          <div class="row"><strong>${esc(report.postmortem_id)}</strong><span class="badge warn">${esc(report.status)}</span></div>
          <p><strong>根因：</strong>${esc(report.root_cause_conclusion?.cause)}</p>
          <p class="muted">置信度 ${Math.round((report.root_cause_conclusion?.confidence || 0) * 100)}%</p>
        </div>
        <h2>改进建议</h2>
        ${(report.improvement_suggestions || []).map(item => `<div class="card">${esc(item)}</div>`).join('')}
        <h2>时间线快照</h2>
        ${(report.timeline || []).map(item => `<div class="timeline-item">${esc(item.timestamp)} · ${esc(item.summary)}</div>`).join('')}
      `;
      $('postmortemDialog').showModal();
      await refreshAll();
    }

      function initLayoutResizers() {
        const main = document.querySelector('main');
        if (!main) return;
        const res1 = $('col-resizer-1');
        const res2 = $('col-resizer-2');
        const splitter = $('workspace-splitter');
        const scriptsResizer = $('scripts-row-resizer');
        const logsResizer = $('logs-row-resizer');
        const discussionPanel = document.querySelector('.discussion');
        const logsPanel = document.querySelector('.logs');
        const scriptsPanel = $('scriptsSection');
        const logsSection = $('logsSection');
        const left = document.querySelector('.context');
        const center = document.querySelector('.workspace');
        const rightCol = document.querySelector('.right-col');

        let dragging = null;
        let startX = 0;
        let startWidths = null;

        function getWidths() {
          const l = left.getBoundingClientRect().width;
          const c = center.getBoundingClientRect().width;
          const r = rightCol?.getBoundingClientRect().width || 0;
          return { l, c, r };
        }

        function onColPointerDown(e, idx) {
          e.preventDefault();
          dragging = idx;
          startX = e.clientX;
          startWidths = getWidths();
          window.addEventListener('pointermove', onColPointerMove);
          window.addEventListener('pointerup', onColPointerUp, { once: true });
        }

        function onColPointerMove(e) {
          if (!dragging || !startWidths) return;
          const dx = e.clientX - startX;
          if (dragging === 1) {
            const nl = Math.max(160, startWidths.l + dx);
            const nc = Math.max(280, startWidths.c - dx);
            const nr = startWidths.r;
            main.style.setProperty('--col1', nl + 'px');
            main.style.setProperty('--col2', nc + 'px');
            main.style.setProperty('--col3', nr + 'px');
            updateCenterAutoWidth();
          } else if (dragging === 2) {
            const nl = startWidths.l;
            const nc = Math.max(280, startWidths.c + dx);
            const nr = Math.max(180, startWidths.r - dx);
            main.style.setProperty('--col1', nl + 'px');
            main.style.setProperty('--col2', nc + 'px');
            main.style.setProperty('--col3', nr + 'px');
            updateCenterAutoWidth();
          }
        }

        function onColPointerUp() {
          dragging = null;
          startWidths = null;
          window.removeEventListener('pointermove', onColPointerMove);
        }

        res1?.addEventListener('pointerdown', (e) => onColPointerDown(e, 1));
        res2?.addEventListener('pointerdown', (e) => onColPointerDown(e, 2));

        if (splitter) {
          let splitDragging = false;
          let splitStartX = 0;
          let splitWidths = null;
          const leftPanel = center.querySelector('section.panel:first-child');
          const rightPanel = center.querySelector('section.panel:last-child');

          function onSplitPointerDown(e) {
            e.preventDefault();
            splitDragging = true;
            splitStartX = e.clientX;
            splitWidths = {
              left: leftPanel.getBoundingClientRect().width,
              right: rightPanel.getBoundingClientRect().width
            };
            window.addEventListener('pointermove', onSplitPointerMove);
            window.addEventListener('pointerup', onSplitPointerUp, { once: true });
          }

          function onSplitPointerMove(e) {
            if (!splitDragging || !splitWidths) return;
            const dx = e.clientX - splitStartX;
            const newLeft = Math.max(220, splitWidths.left + dx);
            const newRight = Math.max(220, splitWidths.right - dx);
            document.documentElement.style.setProperty('--workspace-left', newLeft + 'px');
            document.documentElement.style.setProperty('--workspace-right', newRight + 'px');
          }

          function onSplitPointerUp() {
            splitDragging = false;
            splitWidths = null;
            window.removeEventListener('pointermove', onSplitPointerMove);
          }

          splitter.addEventListener('pointerdown', onSplitPointerDown);
        }

        function bindRowHandle(handle, targetElement, variableName, invert = false) {
          if (!handle || !targetElement) return;
          handle.addEventListener('pointerdown', (e) => {
            if (e.target instanceof HTMLElement && e.target.closest('button, a, input, textarea, select')) return;
            e.preventDefault();
            handle.setPointerCapture?.(e.pointerId);
            const startY = e.clientY;
            const startHeight = parseFloat(getComputedStyle(targetElement).getPropertyValue(variableName)) || targetElement.getBoundingClientRect().height;
            const parentRect = targetElement === center ? main.getBoundingClientRect() : rightCol.getBoundingClientRect();
            const minHeight = 120;
            const maxHeight = Math.max(minHeight, parentRect.height - 120);
            function onMove(ev) {
              const dy = ev.clientY - startY;
              const proposed = startHeight + (invert ? -dy : dy);
              const newHeight = Math.min(maxHeight, Math.max(minHeight, proposed));
              targetElement.style.setProperty(variableName, newHeight + 'px');
              updateCenterAutoWidth();
            }
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', () => { window.removeEventListener('pointermove', onMove); }, { once: true });
          });
        }

        function updateCenterAutoWidth() {
          if (!main || !left || !rightCol) return;
          const mainRect = main.getBoundingClientRect();
          const leftWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--col1')) || left.getBoundingClientRect().width;
          const rightWidth = rightCol.getBoundingClientRect().width;
          const available = Math.max(420, mainRect.width - leftWidth - rightWidth - 24);
          document.documentElement.style.setProperty('--col2', available + 'px');
        }

        bindRowHandle(scriptsResizer, center, '--workspace-bottom');
        bindRowHandle(logsResizer, rightCol, '--right-bottom');
        bindRowHandle(scriptsPanel?.querySelector('.panel-head'), center, '--workspace-bottom', true);
        bindRowHandle(logsSection?.querySelector('.panel-head'), rightCol, '--right-bottom', true);

        if (window.ResizeObserver) {
          if (rightCol) new ResizeObserver(() => updateCenterAutoWidth()).observe(rightCol);
          if (discussionPanel) new ResizeObserver(() => updateCenterAutoWidth()).observe(discussionPanel);
          if (logsPanel) new ResizeObserver(() => updateCenterAutoWidth()).observe(logsPanel);
        }

        window.addEventListener('resize', updateCenterAutoWidth);
        updateCenterAutoWidth();
      }

      initLayoutResizers();

      boot().catch(err => {
      console.error(err);
      toast('启动失败：请确认后端服务已运行在 8000 端口');
    });
  </script>
</body>
</html>
